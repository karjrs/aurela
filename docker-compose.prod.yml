services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      NODE_ENV: production
    networks:
      - aurela-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${NEXT_PUBLIC_GRAPHQL_ENDPOINT:?set the public GraphQL endpoint in .env}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aurela-net

networks:
  aurela-net:
    driver: bridge
