services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - aurela-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://localhost:4000/api/graphql
    volumes:
      - ./frontend:/app/frontend
      - ./backend/schema.graphql:/app/backend/schema.graphql:ro
      - /app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - aurela-net

networks:
  aurela-net:
    driver: bridge

# Future step (Postgres, not yet): add a `postgres` service to aurela-net,
# a named volume for its data, and DATABASE_URL in the backend's environment.
