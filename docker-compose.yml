name: aurela-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aurela
      POSTGRES_PASSWORD: aurela
      POSTGRES_DB: aurela
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurela"]
      interval: 2s
      retries: 10
    networks:
      - aurela-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DATABASE_URL: postgresql://aurela:aurela@postgres:5432/aurela
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aurela-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRAPHQL_ENDPOINT: http://localhost:4000/api/graphql
    volumes:
      - ./frontend:/app/frontend
      - ./backend/schema.graphql:/app/backend/schema.graphql:ro
      - /app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - aurela-net

networks:
  aurela-net:
    driver: bridge

volumes:
  postgres_data:
